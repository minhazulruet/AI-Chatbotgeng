<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Button Diagnostic - Khandakar's Digital Assistance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
            border-left: 4px solid #2196f3;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
            font-weight: bold;
        }
        .pass {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 3px solid #4caf50;
        }
        .fail {
            background: #ffebee;
            color: #c62828;
            border-left: 3px solid #f44336;
        }
        button {
            padding: 10px 20px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #1976d2;
        }
        .code {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🔍 Quiz System Diagnostic</h1>
    
    <div class="test-section">
        <h2>1. API Connectivity Test</h2>
        <button onclick="testAPIConnection()">Test API Connection</button>
        <div id="apiResult"></div>
    </div>

    <div class="test-section">
        <h2>2. Form Elements Test</h2>
        <button onclick="testFormElements()">Test Form Elements</button>
        <div id="formResult"></div>
    </div>

    <div class="test-section">
        <h2>3. Quiz Generation Test</h2>
        <button onclick="testQuizGeneration()">Test Quiz Generation</button>
        <div id="quizResult"></div>
    </div>

    <div class="test-section">
        <h2>4. Open Quiz Page</h2>
        <button onclick="window.location.href='quiz.html'">Open Quiz</button>
        <p>After opening, open browser console (F12) and check for errors</p>
    </div>

    <script>
        // Dynamically determine API base URL
        const API_BASE_URL = (() => {
            const hostname = window.location.hostname;
            const protocol = window.location.protocol;
            
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                return `${protocol}//localhost:8000`;
            }
            return `${protocol}//${window.location.host}`;
        })();

        async function testAPIConnection() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="test-result pass">✅ API Server is Running</div>
                        <div class="code">Response: ${JSON.stringify(data, null, 2)}</div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="test-result fail">❌ API Server Error</div>
                        <div class="code">Status: ${response.status}</div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="test-result fail">❌ Cannot Connect to API</div>
                    <div class="code">Error: ${error.message}</div>
                    <p><strong>Solution:</strong> Make sure the backend server is running on port 8000</p>
                    <p>Run: <code>cd d:\\RA\\AI Chatbot\\backend && python -m uvicorn app.main:app --reload</code></p>
                `;
            }
        }

        function testFormElements() {
            const resultDiv = document.getElementById('formResult');
            let html = '';

            // Check if quiz.html exists by trying to fetch it
            fetch('quiz.html')
                .then(response => {
                    if (response.ok) {
                        html += '<div class="test-result pass">✅ quiz.html is accessible</div>';
                    } else {
                        html += '<div class="test-result fail">❌ quiz.html not found</div>';
                    }
                    resultDiv.innerHTML = html;
                })
                .catch(error => {
                    html += '<div class="test-result fail">❌ Error accessing quiz.html</div>';
                    resultDiv.innerHTML = html;
                });
        }

        async function testQuizGeneration() {
            const resultDiv = document.getElementById('quizResult');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/quiz/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        topic: 'Test Topic',
                        num_questions: 1,
                        difficulty: 'Easy'
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.quiz_id) {
                    resultDiv.innerHTML = `
                        <div class="test-result pass">✅ Quiz Generation Works</div>
                        <div class="code">Quiz ID: ${data.quiz_id}<br/>Questions: ${data.num_questions}</div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="test-result fail">❌ Quiz Generation Failed</div>
                        <div class="code">Status: ${response.status}<br/>Error: ${data.detail || JSON.stringify(data)}</div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="test-result fail">❌ Quiz Generation Error</div>
                    <div class="code">Error: ${error.message}</div>
                `;
            }
        }
    </script>
</body>
</html>
