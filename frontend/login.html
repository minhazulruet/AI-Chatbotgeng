<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Khandakar's Digital Assistance</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/header-footer.js"></script>
</head>
<body>
    <div class="auth-page">
    <div class="auth-container">
        <h2>Login</h2>
        
        <div id="message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="your@student.qu.edu.qa" required>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Login</button>
            <div class="loading" id="loading">
                <div class="spinner"></div> Logging in...
            </div>
        </form>

        <div class="auth-link">
            Don't have an account? <a href="signup.html">Sign up here</a>
        </div>
    </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
