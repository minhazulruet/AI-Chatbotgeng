<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Solver - Khandakar's Digital Assistance</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/header-footer.js"></script>
    <!-- MathJax for LaTeX rendering -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]'], ['[', ']']]
        },
        svg: {
          fontCache: 'global'
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <!-- Main Container -->
    <div class="mathsolver-page">
        <div class="mathsolver-header">
            <h1>🧮 Math Solver</h1>
            <p>Upload an image and get instant step-by-step solutions</p>
        </div>

        <div class="mathsolver-container">
            <!-- Error Message -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Input Section -->
            <div class="input-section">
                <h2>📝 Upload Your Problem</h2>

                <!-- Image Upload -->
                <div class="form-group">
                    <label>Problem Image *</label>
                    <div class="image-upload-box" id="imageUploadBox">
                        <div class="upload-icon">📸</div>
                        <div class="upload-text">
                            Click to upload or drag and drop<br>
                            <small>PNG, JPG, GIF up to 5MB</small>
                        </div>
                        <input 
                            type="file" 
                            id="imageInput" 
                            accept="image/*" 
                            style="display: none;"
                        />
                    </div>
                    <img id="imagePreview" alt="Image preview" />
                </div>

                <!-- Text Description (Optional) -->
                <div class="form-group">
                    <label>Additional Context (Optional)</label>
                    <textarea 
                        id="textInput" 
                        placeholder="Add any text context or specific questions about the problem..."
                    ></textarea>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button id="solveBtn">
                        🚀 Solve
                    </button>
                    <button id="clearBtn">
                        Clear
                    </button>
                </div>
            </div>

            <!-- Solution Section -->
            <div class="solution-section">
                <h2>💡 Solution</h2>
                
                <div id="loadingMessage" style="display: none;">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Solving your problem...</p>
                        <small>This may take a few seconds</small>
                    </div>
                </div>

                <div id="emptyState" class="empty-state">
                    <div class="empty-state-icon">👈</div>
                    <div class="empty-state-text">Upload an image and click "Solve" to see the solution here</div>
                </div>

                <div id="solutionContent">
                    <div id="solutionText"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/mathsolver.js"></script>
</body>
</html>
